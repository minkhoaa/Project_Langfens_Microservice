<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roleplay Chat + Scenario Selector</title>
  <style>
    :root {
      --bg: #f3efe8;
      --panel: #fffaf2;
      --line: #dfd3c3;
      --text: #28313a;
      --muted: #6d7680;
      --agent: #e2efff;
      --user: #f7e4d6;
      --accent: #0f5f66;
      --accent-soft: #d8ecee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #e6efe9 0%, transparent 28%), linear-gradient(180deg, #f8f3ea, #efe6d8);
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }

    .pane {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(40, 49, 58, 0.08);
    }

    .left {
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
      max-height: calc(100vh - 38px);
      overflow: auto;
    }

    .left h2,
    .chat h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .scenario {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 6px;
      cursor: pointer;
    }

    .scenario.active {
      border-color: var(--accent);
      background: #f3fbfc;
    }

    .scenario small {
      color: var(--muted);
    }

    .chat {
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      min-height: 78vh;
    }

    .chat-header {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .messages {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.45;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .bubble.agent { background: var(--agent); justify-self: start; }
    .bubble.user { background: var(--user); justify-self: end; }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }

    .composer input,
    .composer button {
      border: 1px solid var(--line);
      border-radius: 999px;
      font: inherit;
      padding: 10px 14px;
    }

    .composer button {
      background: var(--accent-soft);
      color: #114d51;
      cursor: pointer;
      font-weight: 600;
    }

    .muted { color: var(--muted); }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .left { max-height: 36vh; }
      .chat { min-height: 58vh; }
    }
  </style>
</head>
<body>
  <main>
    <section class="pane left">
      <h2>Scenario selector</h2>
      <p class="muted">Uses real API when available: <code>/api-ai/api/v1/speaking/roleplay/scenarios</code></p>
      <div id="scenario-list" aria-live="polite"></div>
    </section>

    <section class="pane chat">
      <h2>Roleplay chat</h2>
      <div class="chat-header" id="scenario-header">
        Choose a scenario to start.
      </div>
      <div class="messages" id="messages">
        <div class="bubble agent">Hi, I am your roleplay partner. Select a scenario and we can begin.</div>
      </div>
      <div class="composer">
        <input id="chat-input" type="text" placeholder="Type your response...">
        <button type="button" id="record-btn">Record</button>
        <button type="button" id="send-btn">Send</button>
      </div>
    </section>
  </main>

  <script>
    const fallbackScenarios = [
      { slug: "airport-help-desk", title: "Airport Help Desk", difficulty: "INTERMEDIATE", context: "You missed a connecting flight and need support." },
      { slug: "hotel-check-in", title: "Hotel Check-in", difficulty: "BEGINNER", context: "You need to check in and request a quiet room." },
      { slug: "job-interview-tech", title: "Job Interview (Tech)", difficulty: "ADVANCED", context: "You are interviewing for a junior developer role." }
    ];

    const scenarioList = document.getElementById("scenario-list");
    const scenarioHeader = document.getElementById("scenario-header");
    const messages = document.getElementById("messages");
    const chatInput = document.getElementById("chat-input");
    const sendBtn = document.getElementById("send-btn");
    const recordBtn = document.getElementById("record-btn");

    let selectedScenario = null;

    function addBubble(role, text) {
      const div = document.createElement("div");
      div.className = `bubble ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderScenarios(list) {
      scenarioList.innerHTML = "";
      list.forEach((scenario, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "scenario";
        button.innerHTML = `<strong>${scenario.title}</strong><small>${scenario.difficulty} • ${scenario.slug}</small>`;
        button.addEventListener("click", () => {
          selectedScenario = scenario;
          document.querySelectorAll(".scenario").forEach(el => el.classList.remove("active"));
          button.classList.add("active");
          scenarioHeader.textContent = `${scenario.title}: ${scenario.context}`;
          if (index === 0) {
            addBubble("agent", "Welcome. Could you briefly explain your situation?");
          }
        });
        scenarioList.appendChild(button);
      });
    }

    async function loadScenarios() {
      try {
        const response = await fetch("/api-ai/api/v1/speaking/roleplay/scenarios");
        if (!response.ok) {
          throw new Error("scenario api unavailable");
        }
        const data = await response.json();
        renderScenarios(data.scenarios || fallbackScenarios);
      } catch {
        renderScenarios(fallbackScenarios);
      }
    }

    sendBtn.addEventListener("click", () => {
      const text = chatInput.value.trim();
      if (!text) return;
      addBubble("user", text);
      chatInput.value = "";
      if (selectedScenario) {
        addBubble("agent", `Thanks. In ${selectedScenario.title}, could you add one more detail?`);
      }
    });

    recordBtn.addEventListener("click", () => {
      addBubble("agent", "Audio recorder placeholder active. Connect this button to Whisper STT pipeline in Week 7.");
    });

    loadScenarios();
  </script>
</body>
</html>
